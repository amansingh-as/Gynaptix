<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gynaptix Healthcare Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep: #020d1a;
  --bg-mid: #041528;
  --accent: #00d4ff;
  --accent2: #0066cc;
  --accent3: #00ff9d;
  --user-msg: linear-gradient(135deg, #0066cc, #00d4ff);
  --bot-msg: rgba(4, 28, 55, 0.9);
  --text: #e8f4ff;
  --text-dim: #7ab3d4;
  --border: rgba(0,212,255,0.18);
  --font-head: 'Outfit', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg-deep);
  font-family: var(--font-body);
  overflow: hidden;
  position: relative;
}

/* ── BG ── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, rgba(0,102,204,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 75%, rgba(0,212,255,0.12) 0%, transparent 55%),
    linear-gradient(180deg, #020d1a 0%, #041528 50%, #020d1a 100%);
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 25s linear infinite;
}
@keyframes gridMove { 100% { background-position: 50px 50px; } }

/* ECG top bar */
.ecg-bar {
  position: fixed; top:0; left:0; right:0; height:2px; z-index:200; overflow:hidden;
}
.ecg-bar::after {
  content:''; display:block; width:200%; height:100%;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 48%, #fff 50%, var(--accent) 52%, transparent 100%);
  animation: ecgScan 3s linear infinite;
}
@keyframes ecgScan { 0%{transform:translateX(-100%);} 100%{transform:translateX(50%);} }

/* Floating particles */
.particles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.particle {
  position:absolute; border-radius:50%;
  background: rgba(0,212,255,0.4);
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { transform:translateY(105vh) scale(0); opacity:0; }
  10% { opacity:0.5; }
  90% { opacity:0.2; }
  100% { transform:translateY(-5vh) scale(1); opacity:0; }
}

/* ── CHAT CONTAINER ── */
.chat-wrap {
  position: relative; z-index: 10;
  width: 480px;
  height: 720px;
  display: flex; flex-direction: column;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: rgba(2,13,26,0.88);
  backdrop-filter: blur(28px);
  box-shadow:
    0 0 0 1px rgba(0,212,255,0.08),
    0 30px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(0,212,255,0.08);
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #041e40, #0a3a6e);
  border-bottom: 1px solid var(--border);
  padding: 18px 20px 14px;
  position: relative; overflow: hidden;
}

.header::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.06), transparent);
  animation: headerShimmer 4s ease-in-out infinite;
}
@keyframes headerShimmer {
  0%,100%{transform:translateX(-100%);} 50%{transform:translateX(100%);}
}

.header-top {
  display: flex; align-items: center; justify-content: space-between;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.bot-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 0 2px rgba(0,212,255,0.3), 0 0 16px rgba(0,212,255,0.25);
  animation: avatarPulse 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes avatarPulse {
  0%,100% { box-shadow: 0 0 0 2px rgba(0,212,255,0.3), 0 0 16px rgba(0,212,255,0.25); }
  50%      { box-shadow: 0 0 0 3px rgba(0,212,255,0.5), 0 0 28px rgba(0,212,255,0.4); }
}

.header-info {}
.header-title {
  font-family: var(--font-head); font-size: 16px; font-weight: 700;
  color: var(--text); letter-spacing: 0.5px;
}
.header-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.online-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--accent3);
  margin-right: 5px;
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

/* Back btn in header */
.back-btn {
  text-decoration: none;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px; font-weight: 600;
  color: var(--text-dim);
  font-family: var(--font-head);
  transition: all 0.25s;
  white-space: nowrap;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; gap: 6px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid rgba(0,212,255,0.08);
}

.toolbar input {
  flex: 1; padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(0,212,255,0.15);
  outline: none;
  background: rgba(0,212,255,0.05);
  color: var(--text); font-family: var(--font-body); font-size: 13px;
  transition: border-color 0.25s;
}
.toolbar input::placeholder { color: rgba(122,179,212,0.6); }
.toolbar input:focus { border-color: rgba(0,212,255,0.4); background: rgba(0,212,255,0.08); }

.tool-btn {
  width: 36px; height: 36px;
  border: 1px solid rgba(0,212,255,0.15);
  border-radius: 8px;
  background: rgba(0,212,255,0.07);
  color: var(--text-dim); font-size: 14px;
  cursor: pointer; transition: all 0.25s;
  display: flex; align-items: center; justify-content: center;
}
.tool-btn:hover {
  background: rgba(0,212,255,0.15);
  border-color: var(--accent);
  color: var(--accent);
  transform: scale(1.08);
}

/* ── CHAT BOX ── */
.chat-box {
  flex: 1; padding: 16px 14px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 4px;
  scroll-behavior: smooth;
}

.chat-box::-webkit-scrollbar { width: 4px; }
.chat-box::-webkit-scrollbar-track { background: transparent; }
.chat-box::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 4px; }

/* Date divider */
.date-divider {
  text-align: center; font-size: 11px; color: var(--text-dim);
  margin: 8px 0; letter-spacing: 1px;
  position: relative;
}
.date-divider::before, .date-divider::after {
  content: ''; position: absolute; top: 50%; width: 30%;
  height: 1px; background: var(--border);
}
.date-divider::before { left: 0; }
.date-divider::after { right: 0; }

/* Messages */
.msg {
  padding: 10px 14px;
  border-radius: 16px;
  max-width: 78%;
  font-size: 14px; line-height: 1.55;
  word-wrap: break-word;
  animation: msgPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  position: relative;
}
@keyframes msgPop {
  from { opacity:0; transform:scale(0.85) translateY(10px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.user {
  background: var(--user-msg);
  color: #fff;
  margin-left: auto;
  border-bottom-right-radius: 5px;
  box-shadow: 0 4px 20px rgba(0,102,204,0.35);
}

.bot {
  background: var(--bot-msg);
  color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 5px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}

.msg-time {
  font-size: 10px; opacity: 0.5; margin-top: 4px;
  text-align: right;
}
.bot .msg-time { text-align: left; }

/* Typing indicator */
.typing-indicator {
  display: none;
  align-items: center; gap: 5px;
  padding: 10px 16px;
  background: var(--bot-msg);
  border: 1px solid var(--border);
  border-radius: 16px; border-bottom-left-radius: 5px;
  width: fit-content; max-width: 80px;
  animation: msgPop 0.3s ease both;
}
.typing-indicator.show { display: flex; }
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  animation: typingBounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%,60%,100%{ transform: translateY(0); opacity:0.4; }
  30%{ transform: translateY(-6px); opacity:1; }
}

/* Highlight search */
.highlight { background: rgba(255,220,0,0.7); color: #000; border-radius: 3px; padding: 1px 3px; }
.msg.search-match { border: 1px solid rgba(255,220,0,0.7) !important; }

/* ── INPUT BOX ── */
.input-box {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px;
  background: rgba(0,0,0,0.25);
  border-top: 1px solid var(--border);
}

#user-input {
  flex: 1; padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(0,212,255,0.05);
  color: var(--text); font-family: var(--font-body); font-size: 14px;
  outline: none; transition: all 0.25s;
}
#user-input::placeholder { color: rgba(122,179,212,0.5); }
#user-input:focus {
  border-color: rgba(0,212,255,0.5);
  background: rgba(0,212,255,0.08);
  box-shadow: 0 0 16px rgba(0,212,255,0.12);
}

.send-btn {
  width: 44px; height: 44px;
  border: none; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: var(--bg-deep); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(0,212,255,0.3);
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,212,255,0.5); }
.send-btn:active { transform: scale(0.95); }

/* Quick replies */
.quick-replies {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 6px 14px 4px;
  background: rgba(0,0,0,0.15);
}
.qr-btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: rgba(0,212,255,0.06);
  color: var(--text-dim); font-size: 12px;
  cursor: pointer; transition: all 0.2s;
  font-family: var(--font-body);
  white-space: nowrap;
}
.qr-btn:hover {
  border-color: var(--accent); color: var(--accent);
  background: rgba(0,212,255,0.12);
}
</style>
</head>

<body>
<div class="bg-canvas"></div>
<div class="bg-grid"></div>
<div class="particles" id="particles"></div>
<div class="ecg-bar"></div>

<div class="chat-wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <div class="bot-avatar">🏥</div>
        <div class="header-info">
          <div class="header-title">GYNAPTIX CHATBOT</div>
          <div class="header-sub"><span class="online-dot"></span>AI Medical Assistant · Online</div>
        </div>
      </div>
      <!-- Back btn moved here, original href preserved -->
      <a href="{% url 'home' %}" class="back-btn">← Home</a>
    </div>
  </div>

  <!-- TOOLBAR (original logic: search + clear) -->
  <div class="toolbar">
    <input id="search-input" type="text" placeholder="🔍 Search messages...">
    <button class="tool-btn" onclick="searchChat()" title="Search">🔍</button>
    <button class="tool-btn" onclick="clearChat()" title="Clear chat">🗑️</button>
  </div>

  <!-- QUICK REPLIES -->
  <div class="quick-replies">
    <button class="qr-btn" onclick="quickSend('Book appointment')">📅 Appointment</button>
    <button class="qr-btn" onclick="quickSend('My medical records')">📋 Records</button>
    <button class="qr-btn" onclick="quickSend('Find a doctor')">👨‍⚕️ Doctors</button>
    <button class="qr-btn" onclick="quickSend('Emergency help')">🚨 Emergency</button>
  </div>

  <!-- CHAT BOX -->
  <div id="chat-box" class="chat-box">
    <div class="date-divider">TODAY</div>
    <!-- Welcome message -->
    <div class="msg bot" id="welcome-msg">
      👋 Hello! I'm your <strong>Gynaptix AI Assistant</strong>. I can help you with appointments, medical records, doctor info, and health queries.<br><br>How can I assist you today?
      <div class="msg-time" id="welcome-time"></div>
    </div>
    <div class="typing-indicator" id="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <!-- INPUT BOX (original logic preserved) -->
  <div class="input-box">
    <input id="user-input" type="text" placeholder="Ask a health question..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()" title="Send">➤</button>
  </div>

</div>

<script>
/* ─── PARTICLES ─── */
(function(){
  const c = document.getElementById('particles');
  for(let i=0;i<20;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*3+1.5;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*14+10}s;animation-delay:${Math.random()*-20}s;`;
    c.appendChild(p);
  }
})();

/* Welcome message time */
document.getElementById('welcome-time').textContent = getTime();

/* ─── HELPERS ─── */
function getTime(){
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function scrollDown(){
  const box = document.getElementById('chat-box');
  box.scrollTop = box.scrollHeight;
}

/* ─── ADD MESSAGE (original logic, enhanced) ─── */
function addMessage(text, className) {
  const typing = document.getElementById('typing');
  
  const div = document.createElement('div');
  div.className = 'msg ' + className;
  div.innerHTML = text + `<div class="msg-time">${getTime()}</div>`;

  const box = document.getElementById('chat-box');
  box.insertBefore(div, typing);
  scrollDown();
}

/* ─── SEND MESSAGE (original fetch logic intact) ─── */
function sendMessage() {
  const input = document.getElementById('user-input');
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, 'user');
  input.value = '';

  // Show typing indicator
  const typing = document.getElementById('typing');
  typing.classList.add('show');
  scrollDown();

  fetch('/chatbot/get-response/', {
    method: 'POST',
    headers: {
      'X-CSRFToken': getCookie('csrftoken'),
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body: 'message=' + encodeURIComponent(message)
  })
  .then(res => res.json())
  .then(data => {
    typing.classList.remove('show');
    addMessage(data.response, 'bot');
  })
  .catch(() => {
    typing.classList.remove('show');
    addMessage('⚠️ Connection error. Please try again.', 'bot');
  });
}

/* Quick reply helper */
function quickSend(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

/* ─── CLEAR CHAT (original logic) ─── */
function clearChat() {
  const box = document.getElementById('chat-box');
  // Keep date divider + welcome + typing only
  const typing = document.getElementById('typing');
  const welcome = document.getElementById('welcome-msg');
  box.querySelectorAll('.msg:not(#welcome-msg)').forEach(m => m.remove());
}

/* ─── SEARCH CHAT (original logic + highlight) ─── */
function searchChat() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const messages = document.querySelectorAll('.msg');

  messages.forEach(msg => {
    if (query && msg.innerText.toLowerCase().includes(query)) {
      msg.classList.add('search-match');
    } else {
      msg.classList.remove('search-match');
    }
  });
}

/* Search on Enter key */
document.getElementById('search-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') searchChat();
  if(e.key === 'Escape'){
    document.getElementById('search-input').value = '';
    searchChat();
  }
});

/* ─── SEND ON ENTER ─── */
document.getElementById('user-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') sendMessage();
});

/* ─── CSRF (original logic) ─── */
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}
</script>
</body>
</html>
