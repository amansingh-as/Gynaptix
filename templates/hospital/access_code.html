<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gynaptix Access</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0a2a66, #3aaed8);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #0a2a66;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 12px;
            color: #3aaed8;
            margin-bottom: 25px;
        }

        h2 {
            color: #0a2a66;
            margin-bottom: 20px;
        }

        form p {
            text-align: left;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #3aaed8;
            box-shadow: 0 0 5px rgba(58, 174, 216, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0a2a66;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #3aaed8;
        }

        .cancel {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #0a2a66;
            font-size: 14px;
        }

        .cancel:hover {
            color: #3aaed8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">GYNAPTIX</div>
    <div class="tagline">Secure Healthcare Access</div>

    <h2>Enter Access Code</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Verify</button>
    </form>

    <a class="cancel" href="javascript:history.back()">Cancel</a>
</div>

</body>
</html>
