{% extends 'base.html' %}

{% block content %}

<h2>Patients</h2>

<a href="{% url 'add_patient' %}" class="btn btn-primary mb-3">Add Patient</a>

<form method="GET" class="mb-3">
    <div class="input-group">
        <input type="text" name="q" class="form-control" placeholder="Search by name or phone">
        <button class="btn btn-primary">Search</button>

        <a href="{% url 'patient_list' %}" class="btn btn-secondary">
            Reset
        </a>
    </div>
</form>

<table class="table table-bordered shadow">
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Phone</th>
        <th>Action</th>
       
    </tr>

    {% for p in patients %}
    <tr>
        <td>{{ p.name }}</td>
        <td>{{ p.age }}</td>
        <td>{{ p.phone }}</td>
        <td>
            <a href="{% url 'edit_patient' p.id %}" class="btn btn-warning btn-sm">Edit</a>
            <a href="{% url 'delete_patient' p.id %}" 
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure you want to delete this patient?')">
               Delete
            </a>>
            <a href="{% url 'patient_reports' p.id %}" class="btn btn-info btn-sm">
              Reports
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
