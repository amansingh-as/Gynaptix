{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h3 class="mb-3">Medical Reports</h3>

    <a href="{% url 'add_report' %}" class="btn btn-primary mb-3">Upload Report</a>

    <table class="table table-hover shadow">
        <tr>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Title</th>
            <th>File</th>
            <th>Date</th>
        </tr>

        {% for r in reports %}
        <tr>
            <td>{{ r.patient.name }}</td>
            <td>{{ r.doctor.user.username }}</td>
            <td>{{ r.title }}</td>
            <td>
                <a href="{{ r.file.url }}" target="_blank" class="btn btn-sm btn-info">
                    View
                </a>
            </td>
            <td>{{ r.created_at|date:"d M Y" }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
