{% extends 'base.html' %}

{% block content %}
<h2>Admin Dashboard</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card p-3 shadow">
            <h5>Total Users</h5>
            <p>{{ request.user.username }}</p>
        </div>
    </div>
</div>

<button class="btn btn-primary mt-3" onclick="checkDoctors()">
    Check Doctor Availability
</button>

<script>
function checkDoctors() {
    fetch('/doctor-status/')
    .then(res => res.json())
    .then(data => {
        alert(`Present: ${data.present} | Absent: ${data.absent}`);
    });
}
</script>

{% endblock %}
